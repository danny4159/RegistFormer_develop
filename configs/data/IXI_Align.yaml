##### Dataset Processing Code Implementation #####
# Save data in H5 format
# Store patient-specific data as datasets within each group in the H5 file (e.g., Groups: MR, CT, synCT)
# Each dataset should be in the shape [H, W, D] and normalized between -1 and 1
# And all the data be interpolated into same height, width
# Detailed modifications can be made through transform.py

## Core setting (Important)
_target_: src.data.SynthRAD_MR_CT_Pelvis_datamodule.SynthRAD_MR_CT_Pelvis_DataModule
name: IXI_Align_T2_T1_PD
type: nifti
data_dir: ${paths.root_dir}/data/IXI
data_group_1: "T2"
data_group_2: "T1"
data_group_3: "T1_moved" # '_moved' is misalign simulated set
data_group_4: null # PD
data_group_5: null # PD_moved
data_group_6: null # MRA (for triple outputs)
data_group_7: null # MRA_moved (for triple outputs)
is_3d: False # True: 3D processing, False: 2D processing
batch_size: 4 #5 #10 #4 #30 #16 #12 #2 #1
num_workers: 6 # 3
pin_memory: False
use_split_inference: False # Inference for valid and test is divided into half from the original image (for memory issue)
eval_on_align: True
use_sliding_inference: False
use_multiple_outputs: False
use_triple_outputs: False  # Set True for 3 outputs (T1, PD, MRA)
use_misalign_simul: True
use_25d_style: False
ref_stack_size: 3
apply_rigid_registration: True  # True: training 시작 시 3D rigid registration 수행 후 캐싱
registration_targets: [3, 5, 7]  # group_1 기준 fixed, 여기 명시된 group만 moving으로 등록 (정의 안된 group은 자동 스킵)

## Dataset File Name
# prepared_data_0_0_0_0_0_ver3_final.h5
# Ver3_AllPatientSameSize_final_2.h5
# Ver3_OnlyOnePatient.h5
# Registration_MR_CT_synCT.h5

# Multiple
# train_file: 'IXI_Trainset_Ver2_T1_T2_PD_Registered_30Patient_MisalignSimul_Rotate5Translate5_20SliceOut.h5'
# val_file: 'IXI_Valset_Ver2_T1_T2_PD_Registered_3Patient_MisalignSimul_Rotate5Translate5_20SliceOut.h5'
# test_file: 'IXI_Testset_T1_T2_PD_Registered_30Patient_MisalignSimul_Rotate5Translate5_20SliceOut.h5' 
# Triple
train_file: 'IXI_Trainset_Ver4_T1_T2_PD_MRA_Registered_30Patient_MisalignSimul_Rotate5Translate5_NonLinearSig13_Mag650_CubicInterpolate_BackGroundOutFeather_SliceThicknessSimul_20Slice.h5'
val_file: 'IXI_Valset_Ver4_T1_T2_PD_MRA_Registered_3Patient_MisalignSimul_Rotate5Translate5_NonLinearSig13_Mag650_CubicInterpolate_BackGroundOutFeather_SliceThicknessSimul_20Slice.h5'
test_file: 'IXI_Testset_Ver4_T1_T2_PD_MRA_Registered_30Patient_MisalignSimul_Rotate5Translate5_NonLinearSig13_Mag650_CubicInterpolate_BackGroundOutFeather_SliceThicknessSimul_20Slice.h5' 



## Preprocessing
reverse: False # New
flip_prob: 0 #.5 #0.5
rot_prob: 0 #.5 #0.5
padding_size: null # Padding to hegith, width   [256, 256] -> [target_height, target_width] or null
crop_size: null # Random crop to hegith, width  [128, 128] -> [target_height, target_width] or null
norm_ZeroToOne: False # True: Normalize to [0, 1], False: Assume normalized on [-1, 1]

