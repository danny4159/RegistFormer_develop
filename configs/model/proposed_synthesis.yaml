_target_: src.models.proposed_synthesis_module.ProposedSynthesisModule

name: ProposedSynthesis

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.0001
  betas: [0.5, 0.999]
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.MultiStepLR
  _partial_: true
  milestones: [250000, 300000]
  gamma: 0.5

netG_A:
  _target_: src.models.components.networks_define.define_G
  netG_type: 'proposed_synthesis'
  input_nc: 1
  output_nc: 1
  feat_ch: 128 #256 # For triple_outputs, use 126 or 132 (multiple of 3)
  demodulate: true
  use_multiple_outputs: ${data.use_multiple_outputs}
  use_triple_outputs: ${data.use_triple_outputs}
  is_3d: ${data.is_3d}
  use_separate_style_layers: false
  noise_independent: false  # false: cat 후 noise 주입 (기존), true: chunk별 개별 noise 주입
  use_25d_style: ${data.use_25d_style}
  ref_stack_size: ${data.ref_stack_size}
  z_agg_deep: false          # true: 3-layer z_agg (K->hidden->hidden->1), false: 2-layer (K->hidden->1)
  # init_type: 'kaiming'

netD_A:
  _target_: src.models.components.networks_define.define_D
  input_nc: 1
  ndf: 64
  norm: 'instance'
  n_layers_D: 3
  init_type: 'normal' #'kaiming'

netD_B:
  _target_: src.models.components.networks_define.define_D
  input_nc: 1
  ndf: 64
  norm: 'instance'
  n_layers_D: 3
  init_type: 'normal' #'kaiming'

netD_C:
  _target_: src.models.components.networks_define.define_D
  input_nc: 1
  ndf: 64
  norm: 'instance'
  n_layers_D: 3
  init_type: 'normal' #'kaiming'

netF_A: # For PatchNCELoss
  _target_: src.models.components.networks_define.define_F
  netF_type: 'mlp_sample'
  use_mlp: True #True
  init_type: 'xavier' #'xavier'
  init_gain: 0.02
  nc: 256
  input_nc: 512 # ${model.netG_A.feat_ch} #TODO: input_nc must be 'feat_ch * output_nc'  for multiple/triple outputs



params: # Other params
  lambda_gan: 1
  lambda_style: 5
  # lambda_cycle_a: 1
  # lambda_cycle_b: 1
  # lambda_sc: 0.1
  lambda_nce: 5
  lambda_mind: 0
  lambda_l1: 0
  reverse: ${data.reverse} # A->B if False, B->A if True
  use_split_inference: ${data.use_split_inference}
  flip_equivariance: False
  batch_size: ${data.batch_size}
  nce_layers: [0,2,4,6] # [0,2,4,6] # 3까지가 encoder # [0,1,2,3]-> encoder만 하니까 성능 떨어진다. 전부다 하는게 낫다.
  eval_on_align: ${data.eval_on_align}
  use_sliding_inference: ${data.use_sliding_inference}
  use_multiple_outputs: ${data.use_multiple_outputs} # Set True if data_group_3 is exist (2 outputs)
  use_triple_outputs: ${data.use_triple_outputs} # Set True if data_group_4 is exist (3 outputs: T1, PD, MRA)
  nce_on_vgg: false #True
  nce_independent: false
  use_misalign_simul: ${data.use_misalign_simul}
  is_3d: ${data.is_3d}
  crop_size: ${data.crop_size} # [128,128] or [128,128,16]
  is_registration: false
  use_25d_style: ${data.use_25d_style}
  ref_stack_size: ${data.ref_stack_size}
  ctx_center_only: false     # true: 2.5D에서도 center slice만으로 ctx loss 계산 (2D equivalent)
  ctx_agg_mode: 'softmin'    # 'softmin': center-biased soft-min (default) | 'mean': simple mean over all slices
  ctx_softmin_tau: 0.3       # soft-min temperature (작을수록 hard-min에 가까움) — softmin 전용
  ctx_shift_penalty: 0.05    # center slice preference bias per neighbor step — adaptive OFF일 때 고정값

  # ── V33: Mismatch-adaptive center-biased 2.5D contextual soft-min ────────
  use_ctx_adaptive_center_bias: true
  ctx_adapt_downsample: 4
  ctx_adapt_mismatch_tau: 0.80   # tuned: mismatch mean~0.52 p50~0.47, tau=0.8 gives rel_mean=0.38
  ctx_shift_penalty_min: 0.01
  ctx_shift_penalty_max: 0.05
  ctx_adapt_gamma: 1.0
  ctx_adapt_log: true
