_target_: src.models.proposed_synthesis_module.ProposedSynthesisModule

name: ProposedSynthesis

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.0001
  betas: [0.5, 0.999]
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.MultiStepLR
  _partial_: true
  milestones: [250000, 300000]
  gamma: 0.5

netG_A:
  _target_: src.models.components.networks_define.define_G
  netG_type: 'proposed_synthesis'
  input_nc: 1
  output_nc: 1
  feat_ch: 128 #256 # For triple_outputs, use 126 or 132 (multiple of 3)
  demodulate: true
  use_multiple_outputs: ${data.use_multiple_outputs}
  use_triple_outputs: ${data.use_triple_outputs}
  is_3d: ${data.is_3d}
  use_separate_style_layers: false
  noise_independent: false  # false: cat 후 noise 주입 (기존), true: chunk별 개별 noise 주입
  use_25d_style: ${data.use_25d_style}
  ref_stack_size: ${data.ref_stack_size}
  z_agg_deep: false          # true: 3-layer z_agg (K->hidden->hidden->1), false: 2-layer (K->hidden->1)
  # Source-anchored local 2.5D correspondence attention.
  # For first experiments, use with use_25d_style=true and keep use_z_attn_agg=false.
  use_local_ref_attn: false
  use_z_attn_agg: false
  local_attn_hidden: 16
  local_attn_window: 3
  local_attn_temperature: 1.0
  local_attn_center_bias_z: 0.05
  local_attn_center_bias_xy: 0.02
  local_attn_post_conv: false
  # Baseline-preserving residual blend:
  # zagg:   style=(1-alpha)*vanilla_z_agg(ref_stack)+alpha*local_aligned_ref
  # center: style=center_ref+alpha*(local_aligned_ref-center_ref)
  local_ref_blend_mode: "zagg"
  local_ref_blend_alpha_init: 0.1
  local_ref_blend_learnable: true
  # Confidence gating (opt-in). false -> 기존 동작과 완전히 동일.
  use_confidence_gating: false   # true: ref에서 confidence map 추출 + StyleConv residual gating
  conf_init_bias: 2.0            # sigmoid(2.0)≈0.88, 학습 초기 conf high (baseline에 가깝게 출발)
  conf_detach: false             # true: conf로의 gradient 차단 (gating만 영향, conf 학습은 reg loss로만)
  # init_type: 'kaiming'

netD_A:
  _target_: src.models.components.networks_define.define_D
  input_nc: 1
  ndf: 64
  norm: 'instance'
  n_layers_D: 3
  init_type: 'normal' #'kaiming'

netD_B:
  _target_: src.models.components.networks_define.define_D
  input_nc: 1
  ndf: 64
  norm: 'instance'
  n_layers_D: 3
  init_type: 'normal' #'kaiming'

netD_C:
  _target_: src.models.components.networks_define.define_D
  input_nc: 1
  ndf: 64
  norm: 'instance'
  n_layers_D: 3
  init_type: 'normal' #'kaiming'

netF_A: # For PatchNCELoss
  _target_: src.models.components.networks_define.define_F
  netF_type: 'mlp_sample'
  use_mlp: True #True
  init_type: 'xavier' #'xavier'
  init_gain: 0.02
  nc: 256
  input_nc: 128 # ${model.netG_A.feat_ch} # single-output + feat_ch=128



params: # Other params
  lambda_style: 5
  # lambda_cycle_a: 1
  # lambda_cycle_b: 1
  # lambda_sc: 0.1
  lambda_nce: 3
  lambda_mind: 0
  lambda_l1: 0
  lambda_gt_low: 0.5        # weak aligned-GT low-frequency intensity anchor
  lambda_gt_grad: 0.1       # weak aligned-GT finite-difference edge anchor
  gt_low_kernel: 5
  reverse: ${data.reverse} # A->B if False, B->A if True
  use_split_inference: ${data.use_split_inference}
  flip_equivariance: False
  batch_size: ${data.batch_size}
  nce_layers: [0,2,4,6] # [0,2,4,6] # 3까지가 encoder # [0,1,2,3]-> encoder만 하니까 성능 떨어진다. 전부다 하는게 낫다.
  eval_on_align: ${data.eval_on_align}
  use_sliding_inference: ${data.use_sliding_inference}
  use_multiple_outputs: ${data.use_multiple_outputs} # Set True if data_group_3 is exist (2 outputs)
  use_triple_outputs: ${data.use_triple_outputs} # Set True if data_group_4 is exist (3 outputs: T1, PD, MRA)
  nce_on_vgg: false #True
  nce_independent: false
  use_misalign_simul: ${data.use_misalign_simul}
  is_3d: ${data.is_3d}
  crop_size: ${data.crop_size} # [128,128] or [128,128,16]
  is_registration: false
  use_25d_style: ${data.use_25d_style}
  ref_stack_size: ${data.ref_stack_size}
  ctx_center_only: false     # true: 2.5D에서도 center slice만으로 ctx loss 계산 (2D equivalent)
  ctx_softmin_tau: 0.3       # soft-min temperature (작을수록 hard-min에 가까움)
  ctx_shift_penalty: 0.05    # center slice preference bias per neighbor step
  ctx_use_z_attn_prior: true # local attention의 z_weights를 contextual stack prior로 재사용
  ctx_z_attn_alpha: 0.2
  # Confidence regularization (only active when use_confidence_gating=true AND lambda > 0).
  lambda_conf_smooth: 0.0    # TV smoothness on conf map. 추천 시작값: 1.0e-4
  lambda_conf_mean: 0.0      # collapse 방지 (conf가 0으로 가는 걸 막음). 추천 시작값: 1.0e-3
  conf_min_mean: 0.5         # 위 lambda_conf_mean 사용 시 conf 평균 하한선
